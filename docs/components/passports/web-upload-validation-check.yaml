id: web.upload.validation-check
name: ValidationCheck
platform: web
kind: feedback
status: stable
source: my-app/components/upload/ValidationCheck.tsx
owner: generation-feature

public_api:
  exports:
    - ValidationCheck
    - ValidationCheckProps
  props:
    - "status: idle | checking | success | error"
    - "message: string"
    - "details: UploadValidationDetails"

dependencies:
  internal:
    - my-app/lib/upload-validation-contract.ts
  external: []

styling:
  strategy: global-css-token-contract
  global_css:
    file: my-app/app/globals.css
    layer: components
    namespace: c-upload-validation
  tokens:
    - --app-border
    - --app-surface-muted
    - --app-text
    - --app-muted
    - --app-accent
    - --app-success
    - --app-success-bg
    - --app-danger
    - --app-danger-bg
  variants:
    - idle
    - checking
    - success
    - error
  data_contract:
    data-status: idle | checking | success | error
  allows_className: false
  inline_styles_allowed: false

state:
  owned: []
  external_store: false
side_effects: false

a11y_contract:
  error: role-alert-aria-live-assertive
  non_error: role-status-aria-live-polite
  announcements:
    - aria-atomic-true
    - aria-busy-while-checking
  details:
    - format-result
    - size-result
    - resolution-result
    - face-detection-result

test_surface:
  contract: my-app/lib/upload-validation-harness.test.ts
  interaction: tests/web-e2e/upload-validation.spec.ts
  accessibility: axe-serious-critical-zero
  visual:
    - tests/web-e2e/__screenshots__/upload-validation.spec.ts/upload-validation-320-light.png
    - tests/web-e2e/__screenshots__/upload-validation.spec.ts/upload-validation-375-dark.png

change_policy:
  current_gate: promotion-complete
  compatible_change_requires:
    - passport-update
    - upload-validation-contract-test
    - web-typecheck
  behavioral_change_requires:
    - upload-interaction-test
  style_contract_change_requires:
    - c-upload-validation-selector-search
    - responsive-visual-verification

promotion_evidence:
  - hook-independent-public-status-and-details-contract
  - global-components-layer-c-upload-validation-token-and-state-contract
  - idle-checking-success-error-details-and-live-region-contract
  - aria-atomic-and-checking-busy-state
  - axe-serious-critical-zero
  - 320px-light-and-375px-dark-visual-and-horizontal-overflow-verification

promotion_blockers: []

residual_risks:
  - authenticated-workspace-end-to-end-announcement-order-not-yet-recorded
  - physical-screen-reader-verification-not-yet-complete
